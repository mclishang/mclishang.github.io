if (typeof window !== 'undefined') {
  
  let toastTimer = null;

  function initThemeToggle() {
    const htmlRoot = document.querySelector('html');
    const themeToggle = document.getElementById('themeToggle');

    const getTheme = () => {
      const localStorageTheme = localStorage?.getItem("theme") ?? '';
      if (['dark', 'light', 'system'].includes(localStorageTheme)) {
        return localStorageTheme;
      }
      return 'system';
    };

    // 从 DOM 属性实时获取翻译
    const translations = {
      light: themeToggle.dataset.tLight,
      dark: themeToggle.dataset.tDark,
      system: themeToggle.dataset.tSystem
    };

    function showThemeToast(themeName) {
      let toast = document.getElementById('theme-toast') || (() => {
        const t = document.createElement('div');
        t.id = 'theme-toast';
        document.body.appendChild(t);
        return t;
      })();

      toast.textContent = translations[themeName] || translations['system'];
      
      clearTimeout(toastTimer);
      toast.classList.remove('show');
      void toast.offsetWidth; 
      toast.classList.add('show');

      toastTimer = setTimeout(() => toast.classList.remove('show'), 3000);
    }

    const setTheme = (themeSet, isFirstLoad = false) => { 
      if (themeSet === 'dark') {
        htmlRoot.setAttribute('data-theme', 'dark');
        htmlRoot.classList.remove('system-theme');
      } else if (themeSet === 'light') {
        htmlRoot.removeAttribute('data-theme');
        htmlRoot.classList.remove('system-theme');
      } else {
        htmlRoot.classList.add('system-theme');
        if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
          htmlRoot.setAttribute('data-theme', 'dark');
        } else {
          htmlRoot.removeAttribute('data-theme');
        }
      }
      window.localStorage.setItem('theme', themeSet);

      // --- 新增：如果不是页面初次加载，则显示弹窗 ---
      if (!isFirstLoad) {
        showThemeToast(themeSet);
      }
    };

    // 系统主题变化监听器
    const handleSystemThemeChange = (e) => {
      if (htmlRoot.classList.contains('system-theme')) {
        if (e.matches) {
          htmlRoot.setAttribute('data-theme', 'dark');
        } else {
          htmlRoot.removeAttribute('data-theme');
        }
      }
    };

    const mediaQuery = window.matchMedia('(prefers-color-scheme: dark)');
    mediaQuery.removeEventListener?.('change', handleSystemThemeChange);
    mediaQuery.addEventListener('change', handleSystemThemeChange);

    const handleToggleClick = () => {
      const currentTheme = localStorage.getItem('theme') || 'system';
      let nextTheme;
      if (currentTheme === 'light') nextTheme = 'dark';
      else if (currentTheme === 'dark') nextTheme = 'system';
      else nextTheme = 'light';
      setTheme(nextTheme, false);
    };

    themeToggle?.removeEventListener('click', handleToggleClick);
    themeToggle?.addEventListener('click', handleToggleClick);

    setTheme(getTheme(), true);
  }

  document.addEventListener('astro:page-load', initThemeToggle);
  document.addEventListener('astro:after-swap', initThemeToggle);
}

function initPagefindSearch() {
  const searchInput = document.getElementById('search-input');
  const searchResults = document.getElementById('search-results');
  
  if (!searchInput || !searchResults) return;

  // 避免重复绑定
  if (searchInput.dataset.bound === 'true') return;
  searchInput.dataset.bound = 'true';

  let searchTimeout;

  searchInput.addEventListener('input', (e) => {
    const query = e.target.value.trim();
    clearTimeout(searchTimeout);
    
    searchTimeout = setTimeout(() => {
      if (query.length > 0) {
        performSearch(query);
      } else {
        // 清空或显示默认状态
        searchResults.innerHTML = `
          <div class="p-8 text-center text-[var(--text-color-70)]">
            <p>${translations.placeholder}</p>
          </div>
        `;
      }
    }, 300);
  });
}

async function performSearch(query) {
  const searchResults = document.getElementById('search-results');
  const isDev = !window.pagefind;

  if (isDev) {
    displayResults(fakeResult);
  } else if (window.pagefind) {
    await window.pagefind.destroy();
    await window.pagefind.init();
    // console.log('Pagefind is initialized');
    try {
      const searchResultsData = await window.pagefind.search(query);
      const results = [];

      for (const result of searchResultsData.results) {
        const data = await result.data();
        results.push({
          url: data.url,
          meta: { title: data.meta.title },
          excerpt: data.excerpt
        });
      }

      displayResults(results);
    } catch (error) {
      console.error('Search failed:', error);
      searchResults.innerHTML = `
        <div class="p-8 text-center text-red-500">
          <p>${translations.error}</p>
        </div>
      `;
    }

    searchResults.innerHTML = `
      <div class="p-8 text-center text-[var(--text-color-70)]">
        <p>搜索功能暂时不可用</p>
      </div>
    `;
  }
}

function displayResults(results) {
  const searchResults = document.getElementById('search-results');
  if (!searchResults) return;

  if (results.length === 0) {
    searchResults.innerHTML = `
      <div class="p-8 text-center text-[var(--text-color-70)]">
        <p>${translations.noresult}</p>
      </div>
    `;
    return;
  }

  searchResults.innerHTML = results.map(result => `
    <div class="p-4 border-b border-[var(--button-border-color)] hover:bg-[var(--button-hover-color)]">
      <a href="${result.url}" class="block no-underline">
        <h3 class="text-lg font-semibold text-[var(--text-color)] mb-2">${result.meta.title}</h3>
        <p class="text-[var(--text-color-70)] text-sm">${result.excerpt}</p>
      </a>
    </div>
  `).join('');
}
